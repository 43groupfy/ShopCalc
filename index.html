<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShopCalc - Smart Shopping</title>
  <link rel="icon" type="image/png" href="applogo.png">
  
  <meta name="theme-color" content="#2A4B3C" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192x192.png" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    /* Menggunakan font Nunito yang membulat dan ramah, senada dengan icon 3D */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --primary: #2A4B3C;       /* Hijau Tua (Warna body kalkulator) */
      --primary-hover: #1F382D;
      --secondary: #73C32B;     /* Hijau Terang (Warna background & tombol +) */
      --accent: #FF8A00;        /* Oranye (Warna tombol = ) */
      --accent-hover: #E57C00;
      --bg: #F4F7F4;            /* Latar belakang abu kehijauan yang lembut */
      --surface: #ffffff;
      --text: #2A4B3C;          /* Teks utama disamakan dengan hijau tua */
      --text-light: #7A9387;
      --border: #DDE5E0;
      --danger: #ef4444;
      --success: #73C32B;       /* Centang menggunakan hijau terang */
      --delete-btn: #FF7E7E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding-bottom: 120px; /* Space for sticky footer */
    }

    /* Navbar */
    .navbar {
      background-color: var(--surface);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 10px rgba(42, 75, 60, 0.05);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .brand i {
      color: var(--secondary);
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
    }

    /* Main Container */
    .container {
      max-width: 600px;
      margin: 1rem auto;
      padding: 0 1rem;
    }

    /* Item List */
    .item-card {
      background: var(--surface);
      border-radius: 16px; /* Dibuat lebih membulat */
      padding: 1rem;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 6px rgba(42, 75, 60, 0.04);
      border: 2px solid transparent;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: center;
      transition: all 0.2s;
    }

    .item-card.bought {
      opacity: 0.6;
      background: #EAF0EC;
      border-color: var(--border);
      box-shadow: none;
    }

    .item-card.bought input {
      text-decoration: line-through;
      color: var(--text-light);
    }

    /* Checkbox */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
    }
    
    input[type="checkbox"] {
      width: 1.4rem;
      height: 1.4rem;
      accent-color: var(--success);
      cursor: pointer;
      border-radius: 4px;
    }

    /* Inputs */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"], input[type="number"] {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      width: 100%;
    }

    input[type="text"] {
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    input[type="text"]::placeholder { color: #A0B5AA; font-weight: 600; }

    .qty-input { width: 50px !important; text-align: center; background: var(--bg) !important; border-radius: 10px !important; padding: 0.45rem 0.35rem; font-weight: 700;}
    .price-input { flex: 1; background: var(--bg) !important; border-radius: 10px !important; padding: 0.45rem 0.75rem; font-weight: 600;}

    /* Delete Btn */
    .delete-btn {
      color: var(--delete-btn);
      background: none;
      border: none;
      padding: 0.5rem;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1.1rem;
    }

    .delete-btn:hover { color: var(--danger); background: #fee2e2; }

    /* Sticky Footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      padding: 1rem 1.5rem;
      box-shadow: 0 -4px 15px rgba(42, 75, 60, 0.08);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .sticky-footer-inner {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-section {
      display: flex;
      flex-direction: column;
    }

    .total-label { font-size: 0.9rem; color: var(--text-light); font-weight: 700; }
    .total-amount { font-size: 1.6rem; font-weight: 800; color: var(--primary); }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.85rem 1.75rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: 1.05rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 10px rgba(255, 138, 0, 0.3);
      transition: 0.2s;
    }

    .add-btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(255, 138, 0, 0.4); }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-light);
    }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: var(--border); }
    .empty-state p { font-weight: 600; font-size: 1.1rem; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="brand"><i class="fa-solid fa-cart-shopping"></i> ShopCalc</a>
    <button class="clear-btn" onclick="clearAll()">Kosongkan</button>
  </nav>

  <div class="container" id="itemList">
    </div>

  <div class="sticky-footer">
    <div class="sticky-footer-inner">
      <div class="total-section">
        <span class="total-label">Total Belanja</span>
        <span class="total-amount" id="grandTotal">Rp 0</span>
      </div>
      <button class="add-btn" onclick="addItem()">
        <i class="fa-solid fa-plus"></i> Tambah
      </button>
    </div>
  </div>

  <script>
    // State Management
    let items = JSON.parse(localStorage.getItem('shopCalcItems')) || [];

    // Helper: Format Rupiah
    const formatRp = (number) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };

    // Save to LocalStorage
    const saveData = () => {
      localStorage.setItem('shopCalcItems', JSON.stringify(items));
      calculateTotal();
    };

    // Render DOM
    const renderItems = () => {
      const listDiv = document.getElementById('itemList');
      listDiv.innerHTML = '';

      if (items.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-basket-shopping"></i>
            <p>Keranjang masih kosong.<br>Ayo mulai belanja!</p>
          </div>`;
        return;
      }

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = `item-card ${item.bought ? 'bought' : ''}`;
        card.innerHTML = `
          <div class="checkbox-wrapper">
            <input type="checkbox" ${item.bought ? 'checked' : ''} onchange="toggleBought(${index})">
          </div>
          <div class="input-group">
            <input type="text" placeholder="Nama barang..." value="${item.name}" oninput="updateItem(${index}, 'name', this.value)">
            <div class="input-row">
              <input type="number" class="qty-input" placeholder="Qty" value="${item.qty}" min="1" oninput="updateItem(${index}, 'qty', this.value)">
              <b style="display: flex; align-items: center">x</b>
              <input type="number" class="price-input" placeholder="Harga satuan" value="${item.price || ''}" oninput="updateItem(${index}, 'price', this.value)">
            </div>
            <div style="font-size: 0.85rem; color: var(--text-light); font-weight: 700; margin-top: 2px;">
              Subtotal: <span style="color: var(--primary)">${formatRp(item.qty * item.price)}</span>
            </div>
          </div>
          <button class="delete-btn" onclick="deleteItem(${index})"><i class="fa-solid fa-trash-can"></i></button>
        `;
        listDiv.appendChild(card);
      });
      calculateTotal();
    };

    // Actions
    const addItem = () => {
      items.push({ name: '', qty: 1, price: 0, bought: false });
      saveData();
      renderItems();
      // Auto focus on the new item's name input
      setTimeout(() => {
        const inputs = document.querySelectorAll('input[type="text"]');
        if(inputs.length > 0) inputs[inputs.length - 1].focus();
      }, 50);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    };

    const updateItem = (index, field, value) => {
      if(field === 'qty' || field === 'price') value = Number(value);
      items[index][field] = value;
      saveData();
      
      const cards = document.querySelectorAll('.item-card');
      const subtotalSpan = cards[index].querySelector('span');
      subtotalSpan.textContent = formatRp(items[index].qty * items[index].price);
    };

    const toggleBought = (index) => {
      items[index].bought = !items[index].bought;
      saveData();
      renderItems();
    };

    const deleteItem = (index) => {
      items.splice(index, 1);
      saveData();
      renderItems();
    };

    const clearAll = () => {
      if(confirm('Hapus semua barang di keranjang?')) {
        items = [];
        saveData();
        renderItems();
      }
    };

    const calculateTotal = () => {
      const total = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
      document.getElementById('grandTotal').textContent = formatRp(total);
    };

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error: ', err));
      });
    }

    // Initial Render
    renderItems();
  </script>
</body>
</html>
